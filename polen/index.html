function App({initialGrants}){
  const[data,setData]=useState(()=>initialGrants.map(g=>({...g})));
  const[saveMsg,setSaveMsg]=useState(null);
  const[lastSaved,setLastSaved]=useState(null);
  const[saveStatus,setSaveStatus]=useState('ok'); // ok, local, err
  const[search,setSearch]=useState('');
  const[statusFilter,setStatusFilter]=useState('all');
  const[showAdd,setShowAdd]=useState(false);
  const[addPrefill,setAddPrefill]=useState(null);
  const[editMode,setEditMode]=useState(false);
  const[activeView,setActiveView]=useState(false); // "Active Grants" view
  const[calendarView,setCalendarView]=useState(false); // "Upcoming/Calendar" view
  const[isDark,setIsDark]=useState(true);
  useEffect(()=>{document.documentElement.classList.toggle('light',!isDark);},[isDark]);

  // Auto-save: localStorage instantly + server after 2s debounce
  const saveTimer=useRef(null);
  const firstRender=useRef(true);
  useEffect(()=>{
    if(firstRender.current){firstRender.current=false;return;}
    setLastSaved(new Date());
    setSaveStatus('saving');
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      const r=await saveToServer(data);
      if(r.ok){setSaveStatus('ok');setLastSaved(new Date());setSaveMsg(null);}
      else{setSaveStatus('local');setSaveMsg(r.msg);}
    },2000);
    return()=>{if(saveTimer.current)clearTimeout(saveTimer.current);};
  },[data]);

  // Group entries by grant program (foundation + grant combo)
  const programGroups=useMemo(()=>{
    let r=[...data];
    if(statusFilter==='apply')r=r.filter(g=>g.nextStep==='01 Apply on deadline'||g.nextStep==='00 Send Proposal');
    else if(statusFilter!=='all')r=r.filter(g=>g.nextStep===statusFilter);
    if(search){
      const q=search.toLowerCase();
      r=r.filter(g=>(g.foundation||'').toLowerCase().includes(q)||(g.grant||'').toLowerCase().includes(q)||(g.notes||'').toLowerCase().includes(q)||(g.projectDates||'').toLowerCase().includes(q));
    }
    // Group by foundation + grant
    const groups={};
    r.forEach(g=>{
      const key=(g.foundation||'').trim()+'|||'+(g.grant||'').trim();
      if(!groups[key])groups[key]={key,foundation:(g.foundation||'').trim(),grant:(g.grant||'').trim(),entries:[]};
      groups[key].entries.push(g);
    });
    const now=new Date();now.setHours(0,0,0,0);
    // For each group, compute stats and find next deadline
    return Object.values(groups).map(grp=>{
      grp.entries.sort((a,b)=>(b.deadline||'').localeCompare(a.deadline||'')); // newest first
      const futureEntries=grp.entries.filter(e=>e.deadline&&new Date(e.deadline+'T00:00:00')>=now).sort((a,b)=>a.deadline.localeCompare(b.deadline));
      grp.nextDeadline=futureEntries[0]||null;
      grp.primary=grp.entries[0];
      grp.received=grp.entries.filter(e=>e.nextStep==='05 Received').length;
      grp.denied=grp.entries.filter(e=>e.nextStep==='04 Denied').length;
      grp.waiting=grp.entries.filter(e=>e.nextStep==='03 Waiting Results').length;
      grp.totalAmt=grp.entries.filter(e=>e.nextStep==='05 Received').reduce((s,e)=>s+(e.amountReceived||e.amount||0),0);
      return grp;
    }).sort((a,b)=>{
      // Groups with future deadlines first (soonest), then past (most recent)
      const aD=a.nextDeadline?a.nextDeadline.deadline:'9999';
      const bD=b.nextDeadline?b.nextDeadline.deadline:'9999';
      const aFut=a.nextDeadline&&new Date(aD+'T00:00:00')>=now;
      const bFut=b.nextDeadline&&new Date(bD+'T00:00:00')>=now;
      if(aFut&&!bFut)return -1;
      if(!aFut&&bFut)return 1;
      if(aFut&&bFut)return aD.localeCompare(bD);
      // Both past: most recent first
      const aR=a.primary.deadline||'';
      const bR=b.primary.deadline||'';
      return bR.localeCompare(aR);
    });
  },[data,statusFilter,search]);

  // Active Grants: awarded + currently within grant period
  const activeGrants=useMemo(()=>{
    const now=new Date();
    return data.filter(g=>{
      if(g.nextStep!=='05 Received')return false;
      const p=pPeriod(g.eligiblePeriod);
      if(!p)return false; // no period = can't determine if active
      return now>=p.start&&now<=p.end;
    }).sort((a,b)=>{
      // Sort by period end date (soonest ending first)
      const pa=pPeriod(a.eligiblePeriod), pb=pPeriod(b.eligiblePeriod);
      return(pa?pa.end:new Date('9999'))-(pb?pb.end:new Date('9999'));
    });
  },[data]);

  // Calendar view: only shows grant programs that have an explicit season field
  const calendarData=useMemo(()=>{
    const SEASONS=[
      {key:'Spring',name:'Spring',emoji:'🌱'},
      {key:'Summer',name:'Summer',emoji:'☀️'},
      {key:'Fall',name:'Fall',emoji:'🍂'},
      {key:'Winter',name:'Winter',emoji:'❄️'},
      {key:'Closed',name:'Closed',emoji:'🚫'}
    ];
    const seasonKeyToIdx={Spring:0,Summer:1,Fall:2,Winter:3,Closed:4};
    const monthToSeason=m=>m>=2&&m<=4?0:m>=5&&m<=7?1:m>=8&&m<=10?2:3;
    const curYear=new Date().getFullYear();
    // Build program map — only include entries that have a season field
    const progMap={};
    data.forEach(g=>{
      const hasSeason=g.season&&seasonKeyToIdx[g.season]!==undefined;
      const key=(g.foundation||'').trim()+'|||'+(g.grant||'').trim();
      // Initialize program if any entry of it has a season
      if(hasSeason&&!progMap[key])progMap[key]={foundation:(g.foundation||'').trim(),grant:(g.grant||'').trim(),entries:[],web:g.web||'',season:g.season};
      // If program already exists (season was set on another entry), also collect this entry for history
      if(progMap[key]){
        if(g.deadline){
          const d=new Date(g.deadline+'T00:00:00');
          progMap[key].entries.push({month:d.getMonth(),day:d.getDate(),year:d.getFullYear(),status:g.nextStep,amount:g.amountReceived||g.amount||0,deadline:g.deadline,deadlineType:g.deadlineType||''});
        }
        if(g.web&&!progMap[key].web)progMap[key].web=g.web;
        if(hasSeason)progMap[key].season=g.season;
      }
    });
    const bySeason=[[],[],[],[],[]];
    Object.values(progMap).forEach(prog=>{
      if(!prog.season||seasonKeyToIdx[prog.season]===undefined)return;
      const si=seasonKeyToIdx[prog.season];
      const received=prog.entries.filter(e=>e.status==='05 Received').length;
      const totalApps=prog.entries.length;
      const rate=totalApps>0?Math.round(received/totalApps*100):0;
      const totalAmt=prog.entries.filter(e=>e.status==='05 Received').reduce((s,e)=>s+e.amount,0);
      const history=prog.entries.slice().sort((a,b)=>a.year-b.year||a.month-b.month);
      const thisYearEntries=prog.entries.filter(e=>e.year===curYear);
      const trackedStatuses=['01 Apply on deadline','00 Send Proposal','03 Waiting Results','05 Received','04 Denied','08 Not Eligible'];
      const isTracked=thisYearEntries.some(e=>trackedStatuses.includes(e.status));
      // Skip if already tracked this year (apply/waiting/received/denied)
      if(isTracked)return;
      // Compute last known deadline for reference
      const lastEntry=history.length>0?history[history.length-1]:null;
      const lastDeadline=lastEntry?lastEntry.deadline:null;
      const lastDLType=lastEntry?lastEntry.deadlineType:'';
      const lastMonth=lastEntry?lastEntry.month:null;
      const lastDay=lastEntry?lastEntry.day:null;
      const lastYear=lastEntry?lastEntry.year:null;
      // Estimated next deadline based on historical avg
      const avgMonth=lastMonth;
      const avgDay=lastDay;
      bySeason[si].push({
        foundation:prog.foundation,grant:prog.grant,web:prog.web,
        totalApps,received,rate,totalAmt,history,
        lastDeadline,lastDLType,lastMonth,lastDay,lastYear,avgMonth,avgDay
      });
    });
    bySeason.forEach(arr=>arr.sort((a,b)=>(a.foundation||'').localeCompare(b.foundation||'')));
    const now=new Date();
    const curSeason=monthToSeason(now.getMonth());
    const result=[];
    for(let i=0;i<4;i++){
      const si=(curSeason+i)%4;
      const s=SEASONS[si];
      if(bySeason[si].length>0){
        result.push({...s,isCurrent:si===curSeason,isNext:si===(curSeason+1)%4,grants:bySeason[si]});
      }
    }
    // Closed always at the end
    if(bySeason[4].length>0){
      result.push({...SEASONS[4],isCurrent:false,isNext:false,grants:bySeason[4]});
    }
    return result;
  },[data]);

  const stats=useMemo(()=>({
    total:data.length,
    apply:data.filter(g=>g.nextStep==='01 Apply on deadline'||g.nextStep==='00 Send Proposal').length,
    waiting:data.filter(g=>g.nextStep==='03 Waiting Results').length,
    received:data.filter(g=>g.nextStep==='05 Received').length,
    denied:data.filter(g=>g.nextStep==='04 Denied').length,
    active:activeGrants.length,
    totalAmt:data.filter(g=>g.nextStep==='05 Received').reduce((s,g)=>s+(g.amountReceived||g.amount||0),0),
    activeAmt:activeGrants.reduce((s,g)=>s+(g.amountReceived||g.amount||0),0),
  }),[data,activeGrants]);

  const changeStatus=useCallback((id,newStep)=>setData(p=>p.map(g=>g.id===id?{...g,nextStep:newStep}:g)),[]);
  const changeField=useCallback((id,field,val)=>setData(p=>p.map(g=>g.id===id?{...g,[field]:val}:g)),[]);
  const changeProgramSeason=useCallback((foundation,grant,newSeason)=>{
    const f=(foundation||'').trim(), gr=(grant||'').trim();
    setData(p=>p.map(g=>(g.foundation||'').trim()===f&&(g.grant||'').trim()===gr?{...g,season:newSeason}:g));
  },[]);
  const add=useCallback(g=>setData(p=>[g,...p]),[]);
  const delEntry=useCallback(id=>{if(confirm('Delete this grant entry?'))setData(p=>p.filter(g=>g.id!==id));},[]);
  const dupEntry=useCallback(id=>{setData(p=>{const src=p.find(g=>g.id===id);if(!src)return p;const copy={...src,id:Date.now(),notes:(src.notes||'')+' (copy)'};return[copy,...p];});},[]);
  const[expRow,setExpRow]=useState(null);

  return(
    <div className="app">
      <div className="topbar">
        <img src="logo.png" alt="" style={{height:36}}/>
        <div className="topbar-actions">
          <button className="theme-btn" onClick={()=>window.location.reload()} title="Reload from server">🔄</button>
          <button className="theme-btn" onClick={()=>setIsDark(d=>!d)} title="Toggle light/dark">{isDark?'☀️':'🌙'}</button>
          <button className="btn btn-pri" onClick={()=>setShowAdd(true)}>+ Add Grant</button>
        </div>
      </div>

      <div className="filters">
        <input className="search" placeholder="Search foundation, grant program, notes..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
          {[['all','All',stats.total],['apply','Apply',stats.apply],['03 Waiting Results','Waiting',stats.waiting],['05 Received','Awarded',stats.received],['04 Denied','Denied',stats.denied]].map(([k,l,c])=>
            <button key={k} className={`chip ${statusFilter===k&&!editMode&&!activeView&&!calendarView?'on':''}`} onClick={()=>{setStatusFilter(k);setEditMode(false);setActiveView(false);setCalendarView(false);setExpRow(null);}}>{l}{k!=='all'&&c>0&&<span style={{opacity:.6,marginLeft:3,fontSize:10}}>{c}</span>}</button>
          )}
          <button className={`chip ${activeView&&!editMode&&!calendarView?'on':''}`} onClick={()=>{setActiveView(!activeView);setEditMode(false);setCalendarView(false);setExpRow(null);}} style={activeView?{borderColor:'var(--g)',background:'var(--gbg)',color:'var(--g)'}:{}}>✦ Active ({stats.active})</button>
          <button className={`chip ${calendarView&&!editMode?'on':''}`} onClick={()=>{setCalendarView(!calendarView);setEditMode(false);setActiveView(false);setExpRow(null);}} style={calendarView?{borderColor:'var(--o)',background:'var(--obg)',color:'var(--o)'}:{}}>📅 Upcoming {calendarData.reduce((s,m)=>s+m.grants.length,0)>0&&<span style={{background:'var(--obg)',color:'var(--o)',padding:'0 5px',borderRadius:6,fontSize:10,fontWeight:700,marginLeft:2}}>{calendarData.reduce((s,m)=>s+m.grants.length,0)}</span>}</button>
          <span style={{width:1,height:16,background:'var(--bd)',margin:'0 4px'}}/>
          <button className={`chip ${editMode?'on':''}`} onClick={()=>{setEditMode(!editMode);setActiveView(false);setCalendarView(false);}} style={editMode?{borderColor:'var(--y)',background:'var(--ybg)',color:'var(--y)'}:{}}>✏ Edit All</button>
          {editMode&&<>
            <button className="chip" onClick={async()=>{const r=await saveToServer(data);setSaveMsg(r.msg);setTimeout(()=>setSaveMsg(null),2500);}} style={{borderColor:'var(--g)',background:'var(--gbg)',color:'var(--g)',fontWeight:700}}>💾 Save</button>
            <button className="chip" onClick={()=>exportJSON(data)} style={{borderColor:'var(--b)',color:'var(--b)'}}>⬇ JSON</button>
            <label className="chip" style={{borderColor:'var(--y)',color:'var(--y)',cursor:'pointer'}}>⬆ Import<input type="file" accept=".json" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d)){setData(d);setSaveMsg('Imported '+d.length);setTimeout(()=>setSaveMsg(null),2000);}}catch(err){alert('Invalid JSON');}};rd.readAsText(f);e.target.value='';}}/></label>
            {saveMsg&&<span style={{fontSize:10,color:'var(--g)',fontWeight:600}}>{saveMsg}</span>}
          </>}
        </div>
        <span style={{fontSize:11,color:'var(--tf)',marginLeft:'auto'}}>
          {editMode?`${data.length} entries`:calendarView?`${calendarData.reduce((s,m)=>s+m.grants.length,0)} programs · ${calendarData.length} seasons`:activeView?`${activeGrants.length} active · ${fmt(stats.activeAmt)}`:`${programGroups.length} programs · ${programGroups.reduce((s,g)=>s+g.entries.length,0)} grants`}
          {lastSaved&&<span className="save-indicator"><span className={`dot ${saveStatus}`}/>{saveStatus==='ok'?'Saved':saveStatus==='saving'?'Saving...':'Error'} · {lastSaved.toLocaleTimeString()}</span>}
        </span>
      </div>

      <div className="main-area">
        {editMode?(
          <EditSheet data={data} setData={setData} search={search}/>
        ):calendarView?(
          <div className="cal-view">
            {calendarData.length===0?(
              <div className="cal-empty">
                <div className="cal-empty-icon">✓</div>
                All grant programs are tracked for {new Date().getFullYear()}. Nothing to check.
              </div>
            ):calendarData.map(se=>(
              <div key={se.name} className={`cal-season${se.key==='Closed'?' closed':''}`}>
                <div className="cal-season-hdr">
                  <span className={`cal-season-name ${se.isCurrent?'current':se.isNext?'next':''}`}>{se.emoji} {se.name}</span>
                  <span className="cal-season-count">{se.grants.length}</span>
                  {se.isCurrent&&<span className="cal-season-tag">Now</span>}
                  {se.isNext&&<span className="cal-season-tag" style={{background:'var(--ybg)',color:'var(--y)'}}>Next</span>}
                </div>
                {se.grants.map((g,gi)=>{
                  const goToTimeline=()=>{const k=(g.foundation||'').trim()+'|||'+(g.grant||'').trim();setCalendarView(false);setStatusFilter('all');setSearch('');setExpRow(k);};
                  const MSHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                  return(
                  <div key={gi} className="cal-grant" onClick={goToTimeline}>
                    <div className="cg-top">
                      <div>
                        <div className="cg-foundation">{g.foundation}</div>
                        <div className="cg-program">{g.grant||'—'}</div>
                      </div>
                      <div className="cg-top-right">
                        <select className="cg-season-sel" value={se.key} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();changeProgramSeason(g.foundation,g.grant,e.target.value);}}>
                          <option value="Spring">🌱</option><option value="Summer">☀️</option><option value="Fall">🍂</option><option value="Winter">❄️</option><option value="Closed">🚫</option>
                        </select>
                        <span className="cg-chevron">›</span>
                      </div>
                    </div>
                    {g.lastDeadline&&(
                      <div className="cg-meta">
                        <div className="cg-meta-item"><span className="label">Last deadline</span> <span className="val">{MSHORT[g.lastMonth]} {g.lastDay}, {g.lastYear}</span></div>
                        <span className={`cg-dl-type ${g.lastDLType==='DDLNE!'?'hard':'est'}`}>{g.lastDLType==='DDLNE!'?'HARD':'EST'}</span>
                        {g.totalAmt>0&&<div className="cg-meta-item"><span className="label">Won</span> <span className="val" style={{color:'var(--g)'}}>{fmt(g.totalAmt)}</span></div>}
                      </div>
                    )}
                    <div className="cg-bottom">
                      <div className="cg-history">
                        {g.history.map((h,hi)=>{
                          const cls=h.status==='05 Received'?'received':h.status==='04 Denied'?'denied':h.status==='03 Waiting Results'?'waiting':h.status==='07 Missed Deadline'?'missed':h.status==='08 Not Eligible'?'notelig':'check';
                          return <span key={hi} className="cg-yr"><span className={`sem-dot ${cls}`}/>{String(h.year).slice(-2)}</span>;
                        })}
                        <span className="cg-rate">{g.received}/{g.totalApps}</span>
                      </div>
                      <div style={{display:'flex',gap:6,alignItems:'center'}}>
                        <a className="cg-search-btn" href={'https://www.google.com/search?q='+encodeURIComponent((g.foundation||'')+' '+(g.grant||'')+' grant '+new Date().getFullYear())} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} title="Search on Google">🔍</a>
                        {g.web&&<a className="cg-web-btn" href={g.web} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} title="Open website">🔗</a>}
                        <button className="cg-add-btn" onClick={e=>{e.stopPropagation();setAddPrefill({foundation:g.foundation,grant:g.grant,web:g.web||'',season:se.key});setShowAdd(true);}}>
                          + Add {new Date().getFullYear()}
                        </button>
                      </div>
                    </div>
                  </div>
                );})}
              </div>
            ))}
          </div>
        ):activeView?(
          <div className="active-grid">
            {activeGrants.length===0?(
              <div style={{textAlign:'center',padding:40,color:'var(--tf)'}}>No active grants with a defined grant period right now.</div>
            ):activeGrants.map(g=>{
              const p=pPeriod(g.eligiblePeriod);
              const daysLeft=p?Math.ceil((p.end-new Date())/864e5):null;
              return(
                <div key={g.id} className="active-card">
                  <div className="ac-top">
                    <div className="ac-info">
                      <div className="ac-foundation">{g.foundation}<CopyBtn text={g.foundation}/></div>
                      <div className="ac-grant">{g.grant||'—'}{g.grant&&<CopyBtn text={g.grant}/>}</div>
                      {g.projectDates&&<div className="ac-project">{g.projectDates}</div>}
                    </div>
                    <div className="ac-amounts">
                      <div className="ac-amt">{fmt(g.amountReceived||g.amount)}</div>
                      {daysLeft!=null&&<div className="ac-days" style={{color:daysLeft<=30?'var(--r)':daysLeft<=90?'var(--y)':'var(--g)'}}>{daysLeft}d left</div>}
                      {g.reportDeadline&&<div className="ac-report">Report: {fmtDateShort(g.reportDeadline)}</div>}
                    </div>
                  </div>
                  <Thermo period={g.eligiblePeriod} deadline={g.deadline} reportDeadline={g.reportDeadline}/>
                  {g.notes&&<div className="ac-notes">{g.notes}</div>}
                </div>
              );
            })}
          </div>
        ):(
          <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
          <table className="flat-table">
            <thead><tr>
              <th style={{width:110}}>Deadline</th>
              <th>Foundation</th>
              <th>Grant Program</th>
              <th style={{width:75}}>Status</th>
              <th style={{width:60}}>Apps</th>
              <th style={{width:80}}>Results</th>
              <th style={{width:80}}>Amount</th>
              <th style={{width:120}}></th>
            </tr></thead>
            <tbody>
              {programGroups.map(grp=>{
                const nd=grp.nextDeadline||grp.primary;
                const days=nd&&nd.deadline?daysUntil(nd.deadline):9999;
                const dc=dlClass(days);
                const isExp=expRow===grp.key;
                const relStr=days<0?`${Math.abs(days)}d ago`:days===0?'Today':days<=60?`${days}d`:`${Math.round(days/30)}mo`;
                const latestStep=grp.primary.nextStep;
                const dType=nd?nd.deadlineType:'';
                // Semáforo: year history dots
                const semEntries=grp.entries.slice().sort((a,b)=>(a.deadline||'').localeCompare(b.deadline||''));
                return(
                  <React.Fragment key={grp.key}>
                  <tr className={isExp?'g-sel':''} onClick={()=>setExpRow(isExp?null:grp.key)} style={{cursor:'pointer'}}>
                    {/* Line 1: deadline + status + amount (on mobile: all in one flex row) */}
                    <td className="mob-line1">
                      <span style={{fontSize:10,color:'var(--tf)',transition:'transform .2s',display:'inline-block',transform:isExp?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
                      {nd&&nd.deadline?(
                        <span className={`g-deadline ${dc}`}>{fmtDateShort(nd.deadline)}</span>
                      ):(
                        <span className="g-deadline" style={{color:'var(--tf)'}}>—</span>
                      )}
                      {nd&&nd.deadline&&<span className={`fd-rel ${dc}`} style={{fontSize:8,fontWeight:600,whiteSpace:'nowrap'}}>{relStr}</span>}
                      {dType&&<span className={`fd-type ${dType==='DDLNE!'?'hard':'est'}`}>{dType==='DDLNE!'?'Hard':'Est.'}</span>}
                    </td>
                    {/* Line 2: Foundation */}
                    <td className="flat-fname" style={{fontWeight:600,maxWidth:220,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                      {grp.foundation}<CopyBtn text={grp.foundation}/>
                    </td>
                    {/* Line 3: Grant program + semáforo */}
                    <td className="flat-gname">
                      <span className="g-name" style={{display:'inline'}}>{grp.grant||'—'}{grp.grant&&<CopyBtn text={grp.grant}/>}</span>
                      <span className="prog-sem" style={{marginLeft:6}}>
                        {semEntries.map(e=>{
                          const yr=e.deadline?e.deadline.substring(2,4):'?';
                          const cls=e.nextStep==='05 Received'?'received':e.nextStep==='04 Denied'?'denied':e.nextStep==='03 Waiting Results'?'waiting':e.nextStep==='07 Missed Deadline'?'missed':e.nextStep==='08 Not Eligible'?'notelig':e.nextStep==='02 Check'?'check':'apply';
                          return <span key={e.id} className="sem-yr"><span className={`sem-dot ${cls}`}/><span className="sem-lbl">{yr}</span></span>;
                        })}
                      </span>
                    </td>
                    {/* Desktop-only separate cells */}
                    <td className="desk-only"><span className={`ns ${STEP_CSS[latestStep]||'ns-check'}`}>{STEP_SHORT[latestStep]||latestStep}</span></td>
                    <td className="desk-only" style={{fontSize:10,color:'var(--td)'}}>{grp.entries.length} app{grp.entries.length>1?'s':''}</td>
                    <td className="desk-only">
                      <div style={{display:'flex',gap:3}}>
                        {grp.received>0&&<span className="ms ms-g">✓{grp.received}</span>}
                        {grp.waiting>0&&<span className="ms ms-b">⏳{grp.waiting}</span>}
                        {grp.denied>0&&<span className="ms ms-r">✗{grp.denied}</span>}
                      </div>
                    </td>
                    <td className="desk-only" style={{fontVariantNumeric:'tabular-nums',fontWeight:700,color:'var(--g)',fontSize:11}}>{grp.totalAmt>0?fmt(grp.totalAmt):''}</td>
                    <td className="desk-only" style={{textAlign:'center'}}>
                      {grp.primary.web&&<a href={grp.primary.web} target="_blank" rel="noreferrer" className="btn-conv" onClick={e=>e.stopPropagation()}>Ver Convocatoria <span className="conv-arrow">→</span></a>}
                    </td>
                    {/* Mobile-only: combined right-side stats */}
                    <td className="mob-right">
                      <span className={`ns ${STEP_CSS[latestStep]||'ns-check'}`}>{STEP_SHORT[latestStep]||latestStep}</span>
                      <span style={{fontSize:9,color:'var(--td)'}}>{grp.entries.length}</span>
                      {grp.received>0&&<span className="ms ms-g" style={{fontSize:8}}>✓{grp.received}</span>}
                      {grp.waiting>0&&<span className="ms ms-b" style={{fontSize:8}}>⏳{grp.waiting}</span>}
                      {grp.denied>0&&<span className="ms ms-r" style={{fontSize:8}}>✗{grp.denied}</span>}
                      {grp.totalAmt>0&&<span style={{fontVariantNumeric:'tabular-nums',fontWeight:700,color:'var(--g)',fontSize:9}}>{fmt(grp.totalAmt)}</span>}
                    </td>
                  </tr>
                  {isExp&&(
                    <tr><td colSpan={9} style={{padding:0}}>
                      <div className="hist-panel" onClick={e=>e.stopPropagation()}>
                        {/* Application Timeline */}
                        <div>
                          <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.4px',color:'var(--tf)',marginBottom:8}}>
                            Application Timeline ({grp.entries.length})
                          </div>
                          {grp.entries.map((e,i)=><AppEntry key={e.id} e={e} isLast={i===grp.entries.length-1} onChangeStatus={changeStatus} onChangeField={changeField} onDelete={delEntry} onDuplicate={dupEntry}/>)}
                        </div>
                      </div>
                    </td></tr>
                  )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
          </div>
        )}
      </div>

      {showAdd&&(
        <div className="modal-ov" onClick={()=>setShowAdd(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <AddModal onClose={()=>{setShowAdd(false);setAddPrefill(null);}} onAdd={add} prefill={addPrefill}/>
          </div>
        </div>
      )}
    </div>
  );
}

function AddModal({onClose,onAdd,prefill}){
  const pf=prefill||{};
  const[f,sF]=useState({id:Date.now(),deadline:'',deadlineType:'Estimated',foundation:pf.foundation||'',grant:pf.grant||'',nextStep:'02 Check',web:pf.web||'',notes:'',amount:null,amountReceived:null,eligiblePeriod:'',projectDates:'',improvements:'',source:'calendar',reportDeadline:'',season:pf.season||''});
  const s=(k,v)=>sF(p=>({...p,[k]:v}));
  return(
    <>
      <h3>Add Grant</h3>
      <div className="mf"><label>Foundation *</label><input value={f.foundation} onChange={e=>s('foundation',e.target.value)} placeholder="Foundation name"/></div>
      <div className="mf"><label>Grant program</label><input value={f.grant} onChange={e=>s('grant',e.target.value)} placeholder="Specific grant name"/></div>
      <div className="mf"><label>Deadline *</label><input type="date" value={f.deadline} onChange={e=>s('deadline',e.target.value)}/></div>
      <div style={{display:'flex',gap:8}}>
        <div className="mf" style={{flex:1}}><label>Type</label><select value={f.deadlineType} onChange={e=>s('deadlineType',e.target.value)}><option value="DDLNE!">Hard Deadline</option><option value="Estimated">Estimated Deadline</option></select></div>
        <div className="mf" style={{flex:1}}><label>Status</label><select value={f.nextStep} onChange={e=>s('nextStep',e.target.value)}>{STEPS.map(st=><option key={st} value={st}>{STEP_SHORT[st]}</option>)}</select></div>
        <div className="mf" style={{flex:1}}><label>Season</label><select value={f.season||''} onChange={e=>s('season',e.target.value)}><option value="">—</option><option value="Spring">🌱 Spring</option><option value="Summer">☀️ Summer</option><option value="Fall">🍂 Fall</option><option value="Winter">❄️ Winter</option><option value="Closed">🚫 Closed</option></select></div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <div className="mf" style={{flex:1}}><label>Amount Requested ($)</label><input type="number" value={f.amount||''} onChange={e=>s('amount',e.target.value?parseFloat(e.target.value):null)}/></div>
        <div className="mf" style={{flex:1}}><label>Amount Received ($)</label><input type="number" value={f.amountReceived||''} onChange={e=>s('amountReceived',e.target.value?parseFloat(e.target.value):null)}/></div>
      </div>
      <div className="mf"><label>Web / Link</label><input value={f.web} onChange={e=>s('web',e.target.value)} placeholder="https://..."/></div>
      <div className="mf"><label>Report Deadline</label><input type="date" value={f.reportDeadline} onChange={e=>s('reportDeadline',e.target.value)}/></div>
      <div className="mf"><label>Notes</label><textarea value={f.notes} onChange={e=>s('notes',e.target.value)}/></div>
      <div className="ma">
        <button className="btn btn-sec" onClick={onClose}>Cancel</button>
        <button className="btn btn-pri" onClick={()=>{if(f.foundation.trim()){onAdd(f);onClose();}}}>Add</button>
      </div>
    </>
  );
}

// App is started by the data loader above
</script>
</body>
</html>
